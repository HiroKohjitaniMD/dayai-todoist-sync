name: DayAI ↔ Todoist Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout day-ai-sdk
        uses: actions/checkout@v4
        with:
          repository: day-ai/day-ai-sdk
          path: sdk

      - name: Checkout sync scripts
        uses: actions/checkout@v4
        with:
          path: sync

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SDK dependencies & build
        working-directory: sdk
        run: |
          npm install
          npm run build

      - name: Copy sync script into SDK
        run: |
          cp sync/src/sync.ts sdk/src/sync.ts
          cd sdk && npm run build

      - name: Create .env from secrets
        working-directory: sdk
        run: |
          echo "INTEGRATION_NAME=dayai-todoist-sync" > .env
          echo "DAY_AI_BASE_URL=https://day.ai" >> .env
          echo "CLIENT_ID=${{ secrets.DAYAI_CLIENT_ID }}" >> .env
          echo "CLIENT_SECRET=${{ secrets.DAYAI_CLIENT_SECRET }}" >> .env
          echo "REFRESH_TOKEN=${{ secrets.DAYAI_REFRESH_TOKEN }}" >> .env
          echo "WORKSPACE_ID=" >> .env

      - name: Run sync
        working-directory: sdk
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: node dist/src/sync.js
